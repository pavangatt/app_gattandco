<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f4ea3" />
    <title>Offline | Gatt & Co</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #172033;
        --muted: #60708f;
        --primary: #2f6fed;
        --accent: #14b8a6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        background: linear-gradient(135deg, #f5f7fb 0%, #ecf4ff 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        background: var(--surface);
        border-radius: 24px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .badge {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: #fff;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.45rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 11px 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: var(--primary);
        color: #fff;
      }

      .secondary {
        background: #eaf0ff;
        color: #1b48ad;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <div class="badge">G</div>
        <div>
          <strong>Gatt & Co</strong>
          <div style="color:#60708f;font-size:0.9rem;">Care access portal</div>
        </div>
      </div>
      <h1>You are offline</h1>
      <p>
        The app shell is available, but network data cannot be refreshed right now.
        Reconnect to continue syncing live visits, sessions, and updates.
      </p>
      <div class="actions">
        <button class="primary" type="button" onclick="window.location.reload()">Try again</button>
        <button class="secondary" type="button" onclick="window.history.back()">Go back</button>
      </div>
    </main>
  </body>
</html>
